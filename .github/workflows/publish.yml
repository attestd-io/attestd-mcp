# Publishes on git tag v*.*.* — add NPM_TOKEN (npm automation token) to repo secrets.
name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Verify product catalog count
        run: |
          node -e "const fs=require('fs'); const s=fs.readFileSync('src/products.ts','utf8'); const m=s.match(/COVERED_PRODUCT_COUNT = (\d+)/); if(!m||Number(m[1])<74) { console.error('Expected COVERED_PRODUCT_COUNT >= 74, got', m&&m[1]); process.exit(1); }"

      - name: Smoke test stdio tools/list
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' | node dist/index.js | grep -q check_package_vulnerability

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
