name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify check tool exports CVE fields (AMCP-H1)
        run: node --input-type=module -e "import fs from 'node:fs'; const t=fs.readFileSync('src/tools.ts','utf8'); for (const f of ['cveIds','typosquat','remoteExploitable']) { if (!t.includes(f)) { console.error('missing', f); process.exit(1); } }"
