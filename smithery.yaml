# Smithery: https://smithery.ai/docs
name: "@attestd/mcp"
description: "CVE vulnerability and supply chain integrity checks for Claude Code and MCP clients (Attestd API)"
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      ATTESTD_API_KEY:
        type: string
        description: "Attestd API key (atst_...) — required for check_package_vulnerability only"
      ATTESTD_BASE_URL:
        type: string
        description: "Optional API base URL override (default https://api.attestd.io)"
    required: []
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@attestd/mcp"],
      env: {
        ATTESTD_API_KEY: config.ATTESTD_API_KEY || "",
        ATTESTD_BASE_URL: config.ATTESTD_BASE_URL || ""
      }
    })
